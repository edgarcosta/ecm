name: Test build

on:
  push:
  workflow_dispatch:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            name: macOS ARM64
            with_gwnum: false
          - os: macos-15-intel
            name: macOS x86_64
            with_gwnum: false
          - os: ubuntu-latest
            name: Linux x86_64
            with_gwnum: false
          - os: macos-15-intel
            name: macOS x86_64 GWNUM
            with_gwnum: true
            gwnum_makefile: makemac

    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install gmp autoconf automake libtool

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libgmp-dev autoconf automake libtool

      - name: Build gwnum (macOS GWNUM)
        if: matrix.with_gwnum && runner.os == 'macOS'
        shell: bash
        run: |
          set -euxo pipefail
          P95_URL="https://www.mersenne.org/download/software/v30/30.19/p95v3019b21.source.zip"
          mkdir -p /tmp/P95
          curl -sL -o /tmp/P95/P95_source.zip "$P95_URL"
          unzip -q -o -d /tmp/P95 /tmp/P95/P95_source.zip
          ls /tmp/P95/gwnum/${{ matrix.gwnum_makefile }}
          (cd /tmp/P95/gwnum && make -f ${{ matrix.gwnum_makefile }})
          ls -la /tmp/P95/gwnum/*.a

      - name: Build and test
        shell: bash
        run: |
          set -euxo pipefail
          autoreconf --force --install

          CONFIGURE_FLAGS=()

          if [[ "${{ matrix.with_gwnum }}" == "true" ]]; then
            # The prebuilt gwnum.a from the prime95 zip contains non-PIC
            # x86 asm objects, which Mach-O rejects when linking into a
            # shared library. Build static only for this cell, and force
            # the classic linker (Apple's ld-prime crashes parsing some
            # of those object files).
            CONFIGURE_FLAGS+=(--disable-shared --with-gwnum=/tmp/P95/gwnum)
            export LDFLAGS="-Wl,-ld_classic${LDFLAGS:+ $LDFLAGS}"
          else
            CONFIGURE_FLAGS+=(--enable-shared)
          fi

          if [[ "$RUNNER_OS" == "macOS" ]]; then
            GMP_PREFIX="$(brew --prefix gmp)"
            export CPPFLAGS="-I$GMP_PREFIX/include${CPPFLAGS:+ $CPPFLAGS}"
            export LDFLAGS="-L$GMP_PREFIX/lib${LDFLAGS:+ $LDFLAGS}"
            CONFIGURE_FLAGS+=(--with-gmp="$GMP_PREFIX")
          fi

          ./configure "${CONFIGURE_FLAGS[@]}"

          if [[ "${{ matrix.with_gwnum }}" == "true" ]]; then
            # configure.ac only injects -Wall -W -Wundef when CFLAGS is unset, so we
            # must NOT export CFLAGS before ./configure. Instead extract the CFLAGS
            # configure baked into the Makefile and append our format-strict flags.
            CONFIGURED_CFLAGS=$(grep '^CFLAGS = ' Makefile | head -1 | sed 's/^CFLAGS = //')
            STRICT_CFLAGS="$CONFIGURED_CFLAGS -Werror=format -Werror=format-extra-args"
            JOBS=$(sysctl -n hw.ncpu 2>/dev/null || nproc)
            make -j"$JOBS" CFLAGS="$STRICT_CFLAGS"
            make check CFLAGS="$STRICT_CFLAGS"
          else
            make -j$(nproc 2>/dev/null || sysctl -n hw.ncpu)
            make check
          fi

      - name: Verify underscore detection
        if: always()
        shell: bash
        run: |
          echo "=== Ground truth: does this platform use underscore-prefixed symbols? ==="
          echo "int gurkmacka;" > /tmp/conftest.c
          ${CC:-cc} -c /tmp/conftest.c -o /tmp/conftest.o
          echo "nm output:"
          nm /tmp/conftest.o | grep gurkmacka
          if nm /tmp/conftest.o | grep -q ' _gurkmacka'; then
            ACTUAL=yes
          else
            ACTUAL=no
          fi
          echo "Actual underscore prefix on this platform: $ACTUAL"

          echo ""
          echo "=== What did configure detect? ==="
          if grep -q "gmp_cv_asm_underscore" config.log 2>/dev/null; then
            grep "gmp_cv_asm_underscore" config.log | tail -3
          else
            echo "Underscore test was not run (asm-redc disabled on this platform)"
          fi

          if grep -q "GSYM_PREFIX" config.m4 2>/dev/null; then
            echo "config.m4: $(grep GSYM_PREFIX config.m4)"
          fi

          echo ""
          echo "=== Old link-based detection (for comparison) ==="
          # Replicate the old link-based test to show it fails on macOS
          cat > /tmp/conftes1.c << 'EOF'
          extern void underscore_test(void);
          int main(void) { underscore_test(); return 0; }
          EOF
          for prefix in "" "_"; do
            printf ".globl ${prefix}underscore_test\n${prefix}underscore_test:\nret\n" > /tmp/conftes2.s
            if ${CC:-cc} -c /tmp/conftes1.c -o /tmp/conftes1.o 2>/dev/null && \
               ${CC:-cc} -c /tmp/conftes2.s -o /tmp/conftes2.o 2>/dev/null && \
               ${CC:-cc} /tmp/conftes1.o /tmp/conftes2.o -o /tmp/conftest 2>/dev/null; then
              echo "Old link test with prefix='${prefix}': LINKED OK"
            else
              echo "Old link test with prefix='${prefix}': FAILED TO LINK"
            fi
          done

          echo ""
          if [[ "$ACTUAL" == "yes" ]]; then
            echo "SUMMARY: This platform needs underscore prefix (actual=$ACTUAL)"
          else
            echo "SUMMARY: This platform does not need underscore prefix (actual=$ACTUAL)"
          fi

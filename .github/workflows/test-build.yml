name: Test build

on:
  push:
  workflow_dispatch:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            name: macOS ARM64
          - os: macos-15-intel
            name: macOS x86_64
          - os: ubuntu-latest
            name: Linux x86_64

    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install gmp autoconf automake libtool

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libgmp-dev autoconf automake libtool

      - name: Build and test
        shell: bash
        run: |
          autoreconf --force --install

          if [[ "$RUNNER_OS" == "macOS" ]]; then
            GMP_PREFIX="$(brew --prefix gmp)"
            export CPPFLAGS="-I$GMP_PREFIX/include${CPPFLAGS:+ $CPPFLAGS}"
            export LDFLAGS="-L$GMP_PREFIX/lib${LDFLAGS:+ $LDFLAGS}"
            ./configure --enable-shared --with-gmp="$GMP_PREFIX"
          else
            ./configure --enable-shared
          fi

          make -j$(nproc 2>/dev/null || sysctl -n hw.ncpu)
          make check
